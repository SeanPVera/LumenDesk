name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # macOS runners include xcodebuild by default
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build using xcodebuild
      run: |
        xcodebuild -scheme "LumenDesk" -sdk iphonesimulator build
