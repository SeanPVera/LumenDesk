name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: LumenDesk.xcodeproj
  SCHEME: LumenDesk
  CONFIGURATION: Debug

jobs:
  build:
    name: Validate and build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check committed diff
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          elif [[ "$GITHUB_EVENT_NAME" == "push" && ! "${{ github.event.before }}" =~ ^0+$ ]]; then
            git diff --check "${{ github.event.before }}..${GITHUB_SHA}"
          else
            git diff --check HEAD^..HEAD
          fi

      - name: Validate project and asset catalogs
        shell: bash
        run: |
          plutil -lint LumenDesk/Info.plist LumenDesk/LumenDesk.entitlements
          xcodebuild -list -project "$PROJECT"

          ASSET_OUTPUT="$RUNNER_TEMP/LumenDeskAssetValidation"
          mkdir -p "$ASSET_OUTPUT"
          xcrun actool \
            LumenDesk/Assets.xcassets \
            "LumenDesk/Preview Content/Preview Assets.xcassets" \
            --compile "$ASSET_OUTPUT" \
            --output-partial-info-plist "$RUNNER_TEMP/LumenDeskAssetInfo.plist" \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --app-icon AppIcon \
            --accent-color AccentColor \
            --enable-on-demand-resources NO \
            --development-region en \
            --target-device mac \
            --minimum-deployment-target 13.0 \
            --platform macosx

      - name: Build macOS Debug
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData/macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Build generic iOS device
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData/iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
