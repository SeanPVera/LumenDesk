name: LumenDesk
options:
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  LumenDesk:
    type: application
    platform: macOS
    sources:
      - path: LumenDesk
    info:
      path: LumenDesk/Info.plist
      properties:
        CFBundleDisplayName: LumenDesk
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSLocalNetworkUsageDescription: LumenDesk discovers and controls LIFX and Govee smart bulbs on your local network.
        NSBonjourServices:
          - _lifx._udp
          - _hap._tcp
    entitlements:
      path: LumenDesk/LumenDesk.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumendesk.LumenDesk
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: '"LumenDesk/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  LumenDeskiOS:
    type: application
    platform: iOS
    sources:
      - path: LumenDesk
    info:
      path: LumenDesk/Info-iOS.plist
      properties:
        CFBundleDisplayName: LumenDesk
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocalNetworkUsageDescription: LumenDesk discovers and controls LIFX and Govee smart bulbs on your local network.
        NSBonjourServices:
          - _lifx._udp
          - _hap._tcp
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumendesk.LumenDesk
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: '"LumenDesk/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
