name: LumenDesk
options:
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  LumenDesk:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: LumenDesk
    info:
      path: LumenDesk/Info.plist
      properties:
        CFBundleDisplayName: LumenDesk
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSLocalNetworkUsageDescription: LumenDesk discovers and controls LIFX and Govee smart bulbs on your local network.
        NSMicrophoneUsageDescription: LumenDesk listens to audio levels to animate music-reactive lighting effects.
        NSBonjourServices:
          - _lifx._udp
          - _hap._tcp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumendesk.LumenDesk
        # The sandbox entitlements only exist on macOS; iOS device builds are
        # signed without an entitlements file (Local Network needs none).
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: LumenDesk/LumenDesk.entitlements
        ENABLE_HARDENED_RUNTIME[sdk=macosx*]: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: '"LumenDesk/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
